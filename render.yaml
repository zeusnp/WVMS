services:
  - type: web
    name: wvms
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --threads 8 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 4
    healthCheckPath: /login
    autoDeploy: true
    domains:
      - wvms.onrender.com
    disk:
      name: wvms-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: wvms-db
    plan: free
    type: postgres
    region: singapore
    databaseName: wvms
    user: wvms_admin
    ipAllowList: []
