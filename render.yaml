services:
  - type: web
    name: wvms
    env: python
    region: singapore
    plan: free
    buildCommand: |
      python3 -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: PYTHONUNBUFFERED
        value: "true"
    envVarsFromDatabase:
      - key: DATABASE_URL
        fromDatabase:
          name: wvms-db
          property: connectionString
    healthCheckPath: /login
    autoDeploy: true

databases:
  - name: wvms-db
    databaseName: wvms
    plan: free
    region: singapore
