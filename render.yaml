services:
  - type: web
    name: wvms
    env: python
    region: singapore  # Choose the region closest to your users
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
    autoDeploy: true
    healthCheckPath: /login
    plan: free
