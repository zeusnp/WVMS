services:
  - type: web
    name: wvms
    env: python
    region: singapore
    plan: free
    buildCommand: |
      echo "Setting up environment..."
      chmod +x build.sh
      ./build.sh
    startCommand: |
      echo "Starting Gunicorn server..."
      gunicorn app:app -c gunicorn_config.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: GUNICORN_CMD_ARGS
        value: "--log-level debug"
    envVarsFromDatabase:
      - key: DATABASE_URL
        fromDatabase:
          name: wvms-db
          property: connectionString
    healthCheckPath: /login
    autoDeploy: true
    domains:
      - wvms.onrender.com
    disk:
      name: wvms-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: wvms-db
    databaseName: wvms
    plan: free
    region: singapore
    user: wvms_admin
    ipAllowList: []
