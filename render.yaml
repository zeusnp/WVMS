services:
  - type: web
    name: wvms
    env: python
    region: singapore  # Choose the region closest to your users
    buildCommand: |
      pip install numpy==1.24.3
      pip install -r requirements.txt
    startCommand: |
      python init_db.py
      gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: PORT
        value: 10000
      - key: PYTHONPATH
        value: /opt/render/project/src
    autoDeploy: true
    healthCheckPath: /login
    plan: free

databases:
  - name: wvms_db
    plan: free
    databaseName: wvms
    ipAllowList: []
